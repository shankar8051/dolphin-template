 <div class="w-full max-w-md">
        
        
        <div class="card p-8 frosted-aurora">
            
            
            <div class="center space-y-6 pb-8">
                
                <div class="circle primary filled lg">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                </div>
                
                
                <div class="text-center">
                    <h1 class="text-2xl font-bold color-text mb-2">Create Account</h1>
                    <p class="text-sm color-text-muted">
                        Fill in your details to create a new account
                    </p>
                </div>
            </div>
            
            
            <form class="space-y-6">
                
                
                <div class="space-y-3">
                    <label for="fullname" class="text-sm font-medium color-text block">
                        Full Name
                    </label>
                    <div class="floatinglabel input-icon-left">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input 
                            type="text" 
                            id="fullname" 
                            class="floatinglabel-input" 
                            placeholder=" "
                            required
                         />
                        <label for="fullname" class="floatinglabel-label">John Doe</label>
                    </div>
                </div>
                
                
                <div class="space-y-3">
                    <label for="email" class="text-sm font-medium color-text block">
                        Email address
                    </label>
                    <div class="floatinglabel input-icon-left">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <input 
                            type="email" 
                            id="email" 
                            class="floatinglabel-input" 
                            placeholder=" "
                            required
                         />
                        <label for="email" class="floatinglabel-label">you@example.com</label>
                    </div>
                </div>
                
                
                <div class="space-y-3">
                    <label for="phone" class="text-sm font-medium color-text block">
                        Phone Number
                    </label>
                    <div class="floatinglabel input-icon-left">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                        <input 
                            type="tel" 
                            id="phone" 
                            class="floatinglabel-input" 
                            placeholder=" "
                            required
                         />
                        <label for="phone" class="floatinglabel-label">+977 98XXXXXXXX</label>
                    </div>
                </div>
                
                
                <div class="space-y-3">
                    <label for="password" class="text-sm font-medium color-text block">
                        Password
                    </label>
                    <div class="floatinglabel input-icon-left">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <input 
                            type="password" 
                            id="password" 
                            class="floatinglabel-input" 
                            placeholder=" "
                            required
                         />
                        <label for="password" class="floatinglabel-label">Password</label>
                    </div>
                </div>
                
                
                <div class="space-y-3">
                    <label for="confirm_password" class="text-sm font-medium color-text block">
                        Confirm Password
                    </label>
                    <div class="floatinglabel input-icon-left">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                        <input 
                            type="password" 
                            id="confirm_password" 
                            class="floatinglabel-input" 
                            placeholder=" "
                            required
                         />
                        <label for="confirm_password" class="floatinglabel-label">Confirm Password</label>
                    </div>
                </div>
                
                
                <div class="flex items-center">
                    <input type="checkbox" id="terms" class="primary" required />
                    <label for="terms" class="ml-2 text-sm color-text">
                        I agree to the 
                        <a href="#" class="color-primary hover:underline">Terms & Conditions</a>
                         and 
                        <a href="#" class="color-primary hover:underline">Privacy Policy</a>
                    </label>
                </div>
                
                
                <div class="flex items-center">
                    <input type="checkbox" id="newsletter" class="primary" />
                    <label for="newsletter" class="ml-2 text-sm color-text">
                        Subscribe to newsletter for updates
                    </label>
                </div>
                
                
                <button 
                    type="submit"
                    class="filled primary w-full lg hover:opacity-90 transition-all duration-200"
                >
                    <svg class="w-5 h-5 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Create Account
                </button>
                
                
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-[var(--color-border)]"></div>
                    </div>
                    <div class="relative flex justify-center">
                        <span class="px-3 bg-surface text-sm color-text-muted">
                            Or sign up with
                        </span>
                    </div>
                </div>
                
                
                <div class="grid grid-cols-2 gap-3">
                    <button 
                        type="button"
                        class="outlined rounded-lg py-3 hover:bg-surface-alt transition-all duration-200 flex items-center justify-center"
                    >
                        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>
                    <button 
                        type="button"
                        class="outlined rounded-lg py-3 hover:bg-surface-alt transition-all duration-200 flex items-center justify-center"
                    >
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                        GitHub
                    </button>
                </div>
                
            </form>
            
            
            <div class="mt-8 pt-6 border-t border-[var(--color-border)] text-center">
                <p class="text-sm color-text-muted">
                    Already have an account?
                    <a href="#" class="color-primary font-medium hover:underline ml-1">
                        Sign in
                    </a>
                </p>
                <p class="text-xs color-text-muted mt-3">
                    By creating an account, you agree to our 
                    <a href="#" class="color-primary hover:underline">Terms</a>
                     and 
                    <a href="#" class="color-primary hover:underline">Privacy Policy</a>
                </p>
            </div>
            
        </div>

        
    </div>
